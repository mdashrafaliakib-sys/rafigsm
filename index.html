        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--surface); border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #eee; }
        .hist-item.pending { border-color: var(--gold); } .hist-item.completed { border-color: var(--success); } .hist-item.rejected { border-color: var(--danger); }
        .status-badge { font-size:0.7rem; padding:4px 8px; border-radius:5px; font-weight:700; text-transform:uppercase; }
        .pending .status-badge { color:var(--gold); background:rgba(255,215,0,0.1); }

        .toast.show { opacity: 1; top: 50px; }
    </style>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCYyJfo6ffdoUQaft3IXaaecaTZW9Nqgvk",
  authDomain: "ernigbot.firebaseapp.com",
  databaseURL: "https://ernigbot-default-rtdb.firebaseio.com",
  projectId: "ernigbot",
  storageBucket: "ernigbot.firebasestorage.app",
  messagingSenderId: "645447500194",
  appId: "1:645447500194:web:85f23de032b7a7163bf2fb"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Store Adsgram controllers dynamically
    let adsgramControllers = {};

    // LOCAL STATE
    let appState = {
        user: { balance: 0, totalEarned: 0, referrals: 0, dailyAds: {}, taskHistory: {}, claimedMilestones: [] },
        config: {},
        leaderboard: [],
        history:[]
    };

    // --- SOUND EFFECTS SYSTEM ---
    const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
    function playSfx(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'click') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'coin') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, now);
            osc.frequency.setValueAtTime(1500, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        }
    }
    
    window.onload = async () => {
        if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
            toast("দয়া করে টেলিগ্রাম থেকে ওপেন করুন 🕌");
            return;
        }
        const tgUser = tg.initDataUnsafe.user;

        document.getElementById('u-name').innerText = tgUser.first_name;
        document.getElementById('u-id').innerText = `ID: ${tgUser.id}`;
        if(tgUser.photo_url) document.getElementById('u-img').src = tgUser.photo_url;
        appState.user.id = tgUser.id;

        try {
            const configSnap = await db.ref('config').once('value');
            if (configSnap.exists()) appState.config = configSnap.val();
            
            const userRef = db.ref('users/' + tgUser.id);
            const userSnap = await userRef.once('value');
            
            if (userSnap.exists()) {
                appState.user = { ...appState.user, ...userSnap.val() };
                if (appState.user.isBanned) {
                    document.body.innerHTML = '<h1 style="text-align:center; margin-top: 50px;">দুঃখিত, আপনাকে ব্যান করা হয়েছে।</h1>';
                    return;
                }
            } else {
                const newUser = {
                    id: tgUser.id,
                    firstName: tgUser.first_name,
                    photoUrl: tgUser.photo_url || '',
                    referrals: 0,
                    balance: 0,
                    totalEarned: 0,
                };
                await userRef.set(newUser);
                appState.user = newUser;

                const refId = tg.initDataUnsafe.start_param;
                if (refId && refId != tgUser.id) {
                    const referrerRef = db.ref('users/' + refId);
                    const bonus = appState.config.referralBonus || 0;
                    if(bonus > 0){
                        await referrerRef.update({
                            balance: firebase.database.ServerValue.increment(bonus),
                            totalEarned: firebase.database.ServerValue.increment(bonus),
                            referrals: firebase.database.ServerValue.increment(1)
                        });
                    }
                }
            }
            if(!appState.user.dailyAds) appState.user.dailyAds = {};
            if(!appState.user.taskHistory) appState.user.taskHistory = {};
            if(!appState.user.claimedMilestones) appState.user.claimedMilestones =[];

            const lbSnap = await db.ref('users').orderByChild('referrals').limitToLast(20).once('value');
            if (lbSnap.exists()) {
                const lbData =[];
                lbSnap.forEach(childSnap => { lbData.push(childSnap.val()); });
                appState.leaderboard = lbData.reverse();
            }

            await fetchHistory();
            
            renderAll();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';

        } catch (e) {
            console.error(e);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            toast("ইন্টারনেট সংযোগ নেই! 📶");
        }
    };
    
    async function fetchHistory() {
        const userId = appState.user.id;
        const history =[];
        
        const processSnap = async (path, status) => {
            const snap = await db.ref(path).orderByChild('userId').equalTo(userId).once('value');
            if (snap.exists()) {
                snap.forEach(childSnap => { history.push({ ...childSnap.val(), status: status }); });
            }
        };
        await Promise.all([
            processSnap('withdrawals/pending', 'pending'),
            processSnap('withdrawals/completed', 'completed'),
            processSnap('withdrawals/rejected', 'rejected')
        ]);
        history.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        appState.history = history.slice(0, 20);
    }

    function renderAll() {
        const sym = appState.config.currencySymbol || "৳";
        document.querySelectorAll('.currency').forEach(e => e.innerText = sym);
        const u = appState.user;
        document.getElementById('u-bal').innerText = (u.balance||0).toFixed(2);
        document.getElementById('u-earn').innerText = (u.totalEarned||0).toFixed(2);
        document.getElementById('u-ref').innerText = u.referrals || 0;
        
        // Mini App Referral Link Format
        const botUsername = appState.config.botUsername || 'YourBotUsername';
        const appName = appState.config.appName || 'app';
        document.getElementById('ref-link').value = `https://t.me/${botUsername}/${appName}?startapp=${u.id}`;
        
        document.getElementById('ref-reward-amt').innerText = (appState.config.referralBonus || 0).toFixed(2);
        
        renderAds(); 
        renderTasks(); 
        renderMilestones(); 
        renderLeaderboard(); 
        renderHistory(); 
        renderMethods(); 
        loadAdScripts();
    }

    function renderMilestones() {
        const el = document.getElementById('milestone-area');
        if(!el) return;
        el.innerHTML = '';
        const milestones = appState.config.milestones ||[];
        if(milestones.length === 0) { 
            el.innerHTML = '<p style="text-align:center; font-size:0.9rem; color:#888;">কোনো মাইলস্টোন নেই</p>'; 
            return; 
        }
        
        let html = '';
        const refs = appState.user.referrals || 0;
        const claimed = appState.user.claimedMilestones ||[];
        
        milestones.forEach((m, i) => {
            const isClaimed = claimed.includes(i);
            const isEligible = refs >= m.req;
            let btn = '';
            
            if(isClaimed) {
                btn = `<button class="btn-act btn-wait" disabled>নেওয়া হয়েছে</button>`;
            } else if(isEligible) {
                btn = `<button class="btn-act btn-claim" onclick="playSfx('click'); claimMilestone(${i}, ${m.req}, ${m.reward})">ক্লেম করুন</button>`;
            } else {
                btn = `<button class="btn-act btn-start" disabled>${refs}/${m.req}</button>`;
            }
            
            const pct = Math.min((refs / m.req) * 100, 100);
            
            html += `
            <div class="task-item" style="flex-direction:column; align-items:stretch;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="task-info">
                        <h4>${m.req} জন বন্ধুকে দাওয়াত</h4>
                        <small>পুরস্কার: +${m.reward} ৳</small>
                    </div>
                    ${btn}
                </div>
                <div class="progress-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
            </div>`;
        });
        el.innerHTML = html;
    }

    async function claimMilestone(index, reqRefs, reward) {
        if((appState.user.referrals || 0) < reqRefs) return;
        toast("প্রসেস হচ্ছে... ⏳");
        
        try {
            let claimed = appState.user.claimedMilestones ||[];
            if(claimed.includes(index)) { 
                toast("আপনি এটি ইতিমধ্যে নিয়ে নিয়েছেন!"); 
                return; 
            }
            claimed.push(index);
            
            const updates = {};
            updates[`/users/${appState.user.id}/balance`] = firebase.database.ServerValue.increment(reward);
            updates[`/users/${appState.user.id}/totalEarned`] = firebase.database.ServerValue.increment(reward);
            updates[`/users/${appState.user.id}/claimedMilestones`] = claimed;
            
            await db.ref().update(updates);
            
            appState.user.balance += reward;
            appState.user.totalEarned += reward;
            appState.user.claimedMilestones = claimed;
            
            playSfx('coin');
            tg.HapticFeedback.notificationOccurred('success');
            renderAll();
            toast(`আলহামদুলিল্লাহ! +${reward} ৳ বোনাস পেয়েছেন 🎁`);
        } catch(e) {
            console.error(e);
            toast("ক্লেম ব্যর্থ হয়েছে ⚠️");
        }
    }
    
    function loadAdScripts() {
        const adSlots = appState.config.adSlots ||[];
        adSlots.forEach(s => {
            if(!s.id || !s.network) return;
            if(s.network==='monetag' && !document.querySelector(`script[data-zone="${s.id}"]`)) {
                let sc=document.createElement('script'); 
                sc.src='//libtl.com/sdk.js'; 
                sc.dataset.zone=s.id; 
                sc.dataset.sdk=`show_${s.id}`; 
                document.body.appendChild(sc);
            } else if(s.network==='gigapub' && !document.querySelector(`script[src*="${s.id}"]`)) {
                let sc=document.createElement('script'); 
                sc.src=`https://ad.gigapub.tech/script?id=${s.id}`; 
                document.body.appendChild(sc);
            }
        });
    }
    
    function renderAds() {
        const el = document.getElementById('ad-area'); el.innerHTML = '';
        const today = new Date().toISOString().slice(0,10);
        if(appState.user.lastActive !== today) { 
            appState.user.dailyAds = {}; 
            appState.user.lastActive = today;
            db.ref(`users/${appState.user.id}/lastActive`).set(today);
            db.ref(`users/${appState.user.id}/dailyAds`).set({});
        }
        
        const adSlots = appState.config.adSlots ||[];
        const limit = appState.config.dailyAdLimit || 10;
        
        adSlots.forEach((s, i) => {
            if(!s.id || !s.network) return;
            const done = (appState.user.dailyAds && appState.user.dailyAds[s.id]) || 0;
            const max = done >= limit;
            let adName = s.name || `সালামি ভিডিও ${i+1} 🌙`;
            let adIcon = s.icon || "fas fa-play-circle";
            
            el.innerHTML += `
                <div class="ad-card ${max?'disabled':''}" onclick="${max?'':`playSfx('click'); watchAd('${s.id}','${s.network}')`}">
                    <i class="${adIcon}"></i>
                    <h4>${adName}</h4>
                    <span>${done}/${limit} সম্পন্ন</span>
                </div>
            `;
        });
    }

    function watchAd(id, net) {
        toast("ভিডিও লোড হচ্ছে... ⏳"); 
        tg.HapticFeedback.impactOccurred('light');
        let p;
        
        if(net==='monetag') {
            if(window[`show_${id}`]) p = window[`show_${id}`]();
            else { toast("Monetag বিজ্ঞাপন প্রস্তুত নয় ⚠️"); return; }
        } else if(net==='gigapub') {
            if(window.showGiga) p = window.showGiga();
            else { toast("GigaPub বিজ্ঞাপন প্রস্তুত নয় ⚠️"); return; }
        } else if(net==='adsgram') {
            try {
                if (!adsgramControllers[id]) {
                    adsgramControllers[id] = Adsgram.init({ blockId: id });
                }
                p = adsgramControllers[id].show().then(result => result.done ? Promise.resolve() : Promise.reject());
            } catch(e) {
                console.error("Adsgram Init Error:", e);
                toast("AdsGram বিজ্ঞাপন দেখাতে সমস্যা হচ্ছে ⚠️");
                return;
            }
        } else {
            toast("অজানা বিজ্ঞাপন নেটওয়ার্ক ⚠️"); return;
        }

        p.then(async () => {
             const limit = appState.config.dailyAdLimit || 10;
             const done = (appState.user.dailyAds && appState.user.dailyAds[id]) || 0;
             if (done >= limit) {
                toast("আজকের জন্য এই ভিডিওর লিমিট শেষ! ⚠️");
                return;
            }
            const reward = appState.config.adReward || 0;
            if(reward <= 0) {
                 toast("Reward is not set in admin panel!");
                 return;
            }
            
            await db.ref('users/' + appState.user.id).update({
                balance: firebase.database.ServerValue.increment(reward),
                totalEarned: firebase.database.ServerValue.increment(reward)
            });
            await db.ref(`users/${appState.user.id}/dailyAds/${id}`).set(firebase.database.ServerValue.increment(1));
            
            appState.user.balance += reward;
            appState.user.totalEarned += reward;
            appState.user.dailyAds[id] = (appState.user.dailyAds[id] || 0) + 1;
            
            playSfx('coin');
            tg.HapticFeedback.notificationOccurred('success');
            renderAll(); 
            toast(`আলহামদুলিল্লাহ! +${reward} যোগ হয়েছে 🤲`);
        }).catch(() => toast("ভিডিও সম্পূর্ণ দেখা হয়নি ⚠️"));
    }

    function renderTasks() {
        const el = document.getElementById('task-area'); el.innerHTML = '';
        const tasks = appState.config.webTasks || {};
        const sym = appState.config.currencySymbol || "৳";
        const now = Date.now();
        let pending=[], completed=[];
        Object.keys(tasks).forEach(k => {
            const t = tasks[k];
            const h = (appState.user.taskHistory && appState.user.taskHistory[k]) || {};
            if(t.type === 'onetime' && h.ts) return; 
            let isDone = false;
            let btnHtml = '';
            if(t.type === 'daily' && h.ts && (now - h.ts) < 86400000) { // 24 hours
                isDone = true;
                const left = 86400000 - (now - h.ts);
                const hrs = Math.floor((left / 3600000));
                const mins = Math.floor((left % 3600000) / 60000);
                btnHtml = `<button class="btn-act btn-wait" disabled>${hrs}ঘঃ ${mins}মিঃ</button>`;
            }
            if(!isDone) btnHtml = `<button id="btn-${k}" class="btn-act btn-start" onclick="playSfx('click'); runTask('${k}')">শুরু করুন</button>`;
            const html = `<div class="task-item" style="opacity:${isDone?0.6:1}"><div class="task-left"><img src="${t.icon||'https://via.placeholder.com/45'}" class="task-icon"><div class="task-info"><h4>${t.name}</h4><small>+${t.reward} ${sym}</small></div></div>${btnHtml}</div>`;
            if(isDone) completed.push(html); else pending.push(html);
        });
        el.innerHTML = pending.join('') + completed.join('');
    }
    
    function runTask(id) {
        const t = appState.config.webTasks[id];
        tg.openLink(t.url); tg.HapticFeedback.impactOccurred('medium');
        const btn = document.getElementById(`btn-${id}`);
        let s = 15; btn.className = 'btn-act btn-wait'; btn.disabled = true;
        const i = setInterval(() => {
            btn.innerText = `${s}s`; s--;
            if(s < 0) { clearInterval(i); btn.className = 'btn-act btn-claim'; btn.innerText = 'নিন 🤲'; btn.disabled = false; btn.onclick = () => claimTask(id); }
        }, 1000);
    }
    
    async function claimTask(id) {
        const btn = document.getElementById(`btn-${id}`); btn.disabled = true; btn.innerText = "...";
        try {
            const task = appState.config.webTasks[id];
            const reward = task.reward;
            if(!reward || reward <= 0) { toast("Reward not set!"); return; }

            const updates = {};
            updates[`/users/${appState.user.id}/balance`] = firebase.database.ServerValue.increment(reward);
            updates[`/users/${appState.user.id}/totalEarned`] = firebase.database.ServerValue.increment(reward);
            updates[`/users/${appState.user.id}/taskHistory/${id}`] = { ts: Date.now() };
            
            await db.ref().update(updates);
            
            appState.user.balance += reward;
            appState.user.totalEarned += reward;
            appState.user.taskHistory[id] = { ts: Date.now() };

            playSfx('coin'); 
            tg.HapticFeedback.notificationOccurred('success');
            renderAll(); 
            toast("সালামি গৃহীত! 🌙"); 
        } catch(e) {
            toast("ব্যর্থ হয়েছে!");
            console.error(e);
            renderTasks();
        }
    }

    async function withdraw() {
        const minRefs = appState.config.minWithdrawReferrals || 0;
        if((appState.user.referrals || 0) < minRefs) { 
            document.getElementById('w-msg').style.display='block'; 
            document.getElementById('w-msg').innerText=`টাকা তুলতে অন্তত ${minRefs} জন বন্ধুকে দাওয়াত দিন! 🕌`; 
            return; 
        }
        document.getElementById('w-msg').style.display='none';
        
        const methodEl = document.getElementById('w-method');
        const method = methodEl.value;
        const acc = document.getElementById('w-acc').value;
        const amt = parseFloat(document.getElementById('w-amt').value);
        const sym = appState.config.currencySymbol || "৳";

        if (!method) { toast("একটি মাধ্যম সিলেক্ট করুন"); return; }
        if (!acc || acc.length < 11) { toast("সঠিক অ্যাকাউন্ট নাম্বার দিন"); return; }
        
        const selectedMethod = (appState.config.withdrawMethods ||[]).find(m => m.name === method);
        const minWithdraw = selectedMethod ? selectedMethod.min : 0;

        if(!amt || amt < minWithdraw) { toast(`এই মাধ্যমে সর্বনিম্ন ${minWithdraw} ${sym} তুলতে পারবেন।`); return; }
        if(amt > appState.user.balance) { toast("আপনার অ্যাকাউন্টে পর্যাপ্ত ব্যালেন্স নেই ⚠️"); return; }

        toast("রিকোয়েস্ট প্রসেস হচ্ছে... ⏳");
        
        try {
            const newRequestRef = db.ref('withdrawals/pending').push();
            await newRequestRef.set({
                userId: appState.user.id,
                userName: tg.initDataUnsafe.user.first_name,
                amount: amt,
                method: method,
                account: acc,
                timestamp: Date.now()
            });

            await db.ref(`users/${appState.user.id}/balance`).set(firebase.database.ServerValue.increment(-amt));
            appState.user.balance -= amt;
            
            await fetchHistory();
            renderAll();

            document.getElementById('w-amt').value = '';
            document.getElementById('w-acc').value = '';
            toast("আলহামদুলিল্লাহ, আপনার রিকোয়েস্ট সফল হয়েছে! ✨"); 
            tg.HapticFeedback.notificationOccurred('success');
        } catch (e) {
            console.error(e);
            toast("নেটওয়ার্ক সমস্যার কারণে রিকোয়েস্ট ব্যর্থ হয়েছে ⚠️");
        }
    }

    function renderLeaderboard() {
        const podiumEl = document.getElementById('podium-area');
        const lbEl = document.getElementById('lb-area');
        if(!podiumEl || !lbEl) return;
        
        const lb = appState.leaderboard ||[];
        if(lb.length === 0) {
            podiumEl.innerHTML = '';
            lbEl.innerHTML = '<p style="text-align:center; padding: 20px;">এখনো কেউ লিডারবোর্ডে নেই</p>';
            return;
        }
        
        let top3 = lb.slice(0, 3);
        let rest = lb.slice(3);
        
        let phtml = '';
        if(top3[1]) phtml += getPodium(top3[1], 2);
        if(top3[0]) phtml += getPodium(top3[0], 1);
        if(top3[2]) phtml += getPodium(top3[2], 3);
        podiumEl.innerHTML = phtml;
        
        let lhtml = '';
        rest.forEach((u, i) => {
            const img = u.photoUrl || 'https://ui-avatars.com/api/?name=' + (u.firstName || 'User') + '&background=random';
            lhtml += `
            <div class="lb-item">
                <div class="lb-rank">#${i+4}</div>
                <img src="${img}" class="lb-img">
                <div class="lb-name">${u.firstName || 'Unknown'}</div>
                <div class="lb-val">${u.referrals || 0} <i class="fas fa-users" style="color:#b2bec3; font-size:0.8rem;"></i></div>
            </div>`;
        });
        lbEl.innerHTML = lhtml;
    }

    function getPodium(u, r) { 
        const img = u.photoUrl || 'https://ui-avatars.com/api/?name=' + (u.firstName || 'User') + '&background=random';
        return `
        <div class="podium-item rank-${r}">
            <i class="fas fa-crown crown"></i>
            <img src="${img}" class="podium-img">
            <span class="podium-name">${u.firstName || 'Unknown'}</span>
            <span class="podium-score">${u.referrals || 0} <i class="fas fa-users" style="font-size:0.6rem;"></i></span>
        </div>`;
    }

    function renderHistory() {
        const el = document.getElementById('hist-area');
        if(!el) return;
        const hist = appState.history ||[];
        if(hist.length === 0) { 
            el.innerHTML = '<p style="text-align:center; font-size:0.9rem; color:#888;">কোনো লেনদেনের ইতিহাস নেই</p>'; 
            return; 
        }
        let html = '';
        hist.forEach(h => {
            let statusText = h.status === 'pending' ? 'অপেক্ষমাণ' : (h.status === 'completed' ? 'সফল' : 'বাতিল');
            let date = h.timestamp ? new Date(h.timestamp).toLocaleDateString('bn-BD') : 'Unknown Date';
            html += `
            <div class="hist-item ${h.status}">
                <div>
                    <div style="font-weight:700; color:var(--text);">${h.method || 'Unknown'}</div>
                    <div style="font-size:0.75rem; color:#777;">${date}</div>
                    <div style="font-size:0.85rem; font-weight:600;">${h.account || ''}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:800; color:var(--primary); font-size:1.1rem;">${h.amount || 0} ৳</div>
                    <div class="status-badge">${statusText}</div>
                </div>
            </div>`;
        });
        el.innerHTML = html;
    }

    function renderMethods() {
        const el = document.getElementById('w-method');
        if(!el) return;
        const methods = appState.config.withdrawMethods ||[
            {name: 'বিকাশ', min: 50}, 
            {name: 'নগদ', min: 50}
        ];
        let html = '<option value="" disabled selected>মাধ্যম নির্বাচন করুন</option>';
        methods.forEach(m => {
            html += `<option value="${m.name}">${m.name} (সর্বনিম্ন ${m.min} ৳)</option>`;
        });
        el.innerHTML = html;
    }

    function nav(pageId, element) {
        // Hide all pages
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // Show active page
        document.getElementById(pageId).classList.add('active');
        // Update nav icons
        document.querySelectorAll('.nav i').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        // Scroll to top
        window.scrollTo(0, 0);
    }

    function copyRef() { 
        const linkInput = document.getElementById('ref-link');
        if(!linkInput) return;
        linkInput.select();
        linkInput.setSelectionRange(0, 99999); // For mobile devices
        
        try {
            navigator.clipboard.writeText(linkInput.value).then(() => {
                toast("লিংক কপি হয়েছে! 📋");
            }).catch(() => {
                document.execCommand("copy");
                toast("লিংক কপি হয়েছে! 📋");
            });
        } catch(e) {
            document.execCommand("copy");
            toast("লিংক কপি হয়েছে! 📋");
        }
        tg.HapticFeedback.impactOccurred('light');
    }

    function shareTg() { 
        const link = document.getElementById('ref-link').value;
        const text = encodeURIComponent(`🌙 ঈদ সালামি! 🕋\n\nএই লিংকে ক্লিক করে আমার সাথে যোগ দিন এবং ফ্রিতে সালামি জিতুন! 💸`);
        const url = `https://t.me/share/url?url=${encodeURIComponent(link)}&text=${text}`;
        tg.openTelegramLink(url);
        tg.HapticFeedback.impactOccurred('light');
    }

    function openSupport() { 
        const supportUrl = appState.config.supportUrl || 'https://t.me/YourSupportUsername';
        tg.openTelegramLink(supportUrl);
    }

    function toast(m) { 
        const t = document.getElementById('toast');
        if(!t) return;
        t.innerText = m;
        t.classList.add('show');
        setTimeout(() => { t.classList.remove('show'); }, 3000);
    }
</script>
